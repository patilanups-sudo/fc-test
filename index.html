<!DOCTYPE html>
<html>
<head>
  <title>FC Test</title>
 <style>
  #ad-slot {
    width: 300px;
    height: 250px;
    border: 2px solid red;
    overflow: hidden;
    position: relative;
  }

  /* Force ALL iframes inside slot to 300x250 */
  #ad-slot iframe {
    width: 300px !important;
    height: 250px !important;
    border: none !important;
    display: block !important;
  }

  /* Scale down if creative is 320x480 */
  #ad-slot iframe[width="320"] {
    transform: scale(0.85);
    transform-origin: top left;
  }
</style>
</head>
<body>

  <h2>FC Cap Test Page</h2>
  <p id="counter"></p>
  <p id="status" style="color:blue;">Loading ad...</p>

  <!-- Ad Slot 300x250 -->
  <div id="ad-slot">
    <script async type="text/javascript" 
      src="https://delta.adprime.com/?c=rtb
      &m=direct
      &key=933028022eccdd65c9a0caee19123326
      &w=300
      &h=250">
    </script>
  </div>

  <!-- Counter -->
  <script>
    let count = localStorage.getItem('fc_loads') || 0;
    count++;
    localStorage.setItem('fc_loads', count);
    document.getElementById('counter').innerText
      = 'Page loaded: ' + count + ' times';
  </script>

  <!-- Ad Check -->
  <script>
    setTimeout(function() {
      var slot    = document.getElementById('ad-slot');
      var iframes = slot.getElementsByTagName('iframe');
      var status  = document.getElementById('status');

      if (iframes.length > 0) {
        var iframe = iframes[0];
        status.style.color = 'green';
        status.innerText   = '✅ Ad loaded - '
          + iframe.width + 'x' + iframe.height;
      } else {
        status.style.color = 'red';
        status.innerText   = '❌ No ad found';
      }
    }, 3000);
  </script>

</body>
</html>
