<!DOCTYPE html>
<html>
<head>
  <title>FC Test</title>
</head>
<body>

  <h2>FC Cap Test Page</h2>
  <p id="counter"></p>
  <p id="status" style="color:blue;">Loading ad...</p>

  <!-- Ad Slot -->
  <div id="ad-slot" 
       style="width:300px;
              height:250px;
              border:2px solid red;
              background:#f0f0f0;">
  </div>

  <!-- AdPrime Tag — placed AFTER the div -->
  <script>
    var s = window.location.protocol === 'https:' ? 1 : 0;
    var adDiv = document.getElementById('ad-slot');
    var script = document.createElement('script');
    script.async = true;
    script.src = 'https://delta.adprime.com/?c=rtb&m=direct&key=933028022eccdd65c9a0caee19123326&secure=' + s;
    
    script.onload = function() {
      document.getElementById('status').innerText = '✅ Tag loaded';
    };
    script.onerror = function() {
      document.getElementById('status').innerText = '❌ Tag failed to load';
    };
    
    adDiv.appendChild(script);
  </script>

  <!-- Page load counter -->
  <script>
    let count = localStorage.getItem('fc_loads') || 0;
    count++;
    localStorage.setItem('fc_loads', count);
    document.getElementById('counter').innerText 
      = 'Page loaded: ' + count + ' times';
  </script>

  <!-- Check for ad after 3 seconds -->
  <script>
    setTimeout(function() {
      var slot     = document.getElementById('ad-slot');
      var iframes  = slot.getElementsByTagName('iframe');
      var status   = document.getElementById('status');

      if (iframes.length > 0) {
        status.style.color = 'green';
        status.innerText = '✅ Ad rendered - ' 
          + iframes.length + ' iframe found';
      } else {
        status.style.color = 'red';
        status.innerText = '❌ No ad rendered - '
          + 'check console for errors';
      }
    }, 3000);
  </script>

</body>
</html>
