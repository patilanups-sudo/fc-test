<!DOCTYPE html>
<html>
<head>
  <title>FC Test</title>
  <style>
    #ad-slot {
      /* Match the actual iframe size */
      width: 320px;
      height: 480px;
      border: 2px solid red;
      background: #f0f0f0;
      overflow: visible !important;
      position: relative;
    }

    #ad-slot iframe {
      overflow: visible !important;
      display: block !important;
      visibility: visible !important;
    }
  </style>
</head>
<body>

  <h2>FC Cap Test Page</h2>
  <p id="counter"></p>
  <p id="status" style="color:blue;">Loading ad...</p>

  <!-- Ad Slot — updated to 320x480 -->
  <div id="ad-slot"></div>

  <!-- AdPrime Tag -->
  <script async type="text/javascript" 
    src="https://delta.adprime.com/?c=rtb&m=direct
    &key=933028022eccdd65c9a0caee19123326">
  </script>

  <!-- Counter -->
  <script>
    let count = localStorage.getItem('fc_loads') || 0;
    count++;
    localStorage.setItem('fc_loads', count);
    document.getElementById('counter').innerText 
      = 'Page loaded: ' + count + ' times';
  </script>

  <!-- Check ad after 3 seconds -->
  <script>
    setTimeout(function() {
      var slot    = document.getElementById('ad-slot');
      var iframes = slot.getElementsByTagName('iframe');
      var status  = document.getElementById('status');

      if (iframes.length > 0) {
        var iframe = iframes[0];
        status.style.color   = 'green';
        status.innerText = '✅ Ad loaded - '
          + iframe.width + 'x' + iframe.height;
      } else {
        status.style.color   = 'red';
        status.innerText = '❌ No ad found';
      }
    }, 3000);
  </script>

</body>
</html>
