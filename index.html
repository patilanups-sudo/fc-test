<!DOCTYPE html>
<html>
<head>
  <title>FC Test</title>
  <style>
    #ad-slot {
      width: 300px;
      height: 250px;
      border: 2px solid red;
      background: transparent;
      overflow: hidden;
      position: relative;
    }
    #debug {
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      color: #00ff00;
      font-family: monospace;
      font-size: 13px;
      width: 400px;
      border-radius: 4px;
    }
    #debug p { margin: 4px 0; }
  </style>
</head>
<body>

  <h2>FC Cap Test Page</h2>

  <!-- Debug Panel -->
  <div id="debug">
    <p>⏱ Loading...</p>
  </div>

  <!-- Ad Slot -->
  <div id="ad-slot"></div>

  <!-- AdPrime Tag -->
  <script>
    (function() {
      var ua     = encodeURIComponent(navigator.userAgent);
      var domain = encodeURIComponent(window.location.hostname);
      var page   = encodeURIComponent(window.location.pathname);
      var dw     = window.screen.width;
      var dh     = window.screen.height;
      var url    = "https://delta.adprime.com/?c=rtb&m=js&type=s2c&key=933028022eccdd65c9a0caee19123326&ip=1.1.1.1&ua=" + ua + "&domain=" + domain + "&page=" + page + "&w=300&h=250&dw=" + dw + "&dh=" + dh + "&lat=0&lon=0&bidfloor=0&gdpr_consent=";
      var tag    = document.createElement("script");
      tag.type   = "text/javascript";
      tag.src    = url;
      document.getElementById("ad-slot").appendChild(tag);
    })();
  </script>

  <!-- Debug Info -->
  <script>
    var loadCount = parseInt(localStorage.getItem("fc_loads") || "0") + 1;
    localStorage.setItem("fc_loads", loadCount);

    var debug = document.getElementById("debug");

    setTimeout(function() {
      var slot    = document.getElementById("ad-slot");
      var iframes = slot.getElementsByTagName("iframe");
      var adFired = iframes.length > 0;

      debug.innerHTML = ""
        + "<p>📅 Time       : " + new Date().toLocaleTimeString() + "</p>"
        + "<p>🔄 Page loads : " + loadCount + "</p>"
        + "<p>🌐 Browser    : " + navigator.userAgent.split(")")[0].split("(")[1] + "</p>"
        + "<p>📺 Screen     : " + window.screen.width + "x" + window.screen.height + "</p>"
        + "<p>─────────────────────────────</p>"
        + "<p>📡 Ad Request : ✅ Fired</p>"
        + "<p>🖼 iframe     : " + (adFired ? "✅ Found (" + iframes.length + ")" : "❌ Not found") + "</p>"
        + "<p>─────────────────────────────</p>"
        + "<p style='color:" + (adFired ? "#00ff00" : "#ff4444") + ";font-weight:bold;'>"
        + (adFired ? "✅ IMPRESSION FIRED" : "❌ NO IMPRESSION — FC CAP HIT or NO BID")
        + "</p>"
        + "<p>─────────────────────────────</p>"
        + "<p>📊 Check AdPrime Endpoint #595</p>"
        + "<p>📊 Check Beeswax Campaign report</p>";

    }, 3000);
  </script>

</body>
</html>
